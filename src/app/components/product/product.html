<div class="product" >
  <div class="product-image">
    <img src="assets/images/product/{{productChild.image}}">
  </div>
  <custom-title [title]="productChild.title" #customTitle></custom-title>

  <div class="product-text">{{productChild.description}}</div>
  <div class="product-action" #elem>
    <button class="btn btn-add-to-cart" (click)="addProductToCard()">В корзину</button>
  </div>
</div>
