<section class="products" >
  <div class="container">
    <h2 class="products-title" id="products-title" >Описание пиццы </h2>
    <div class="product-item">


        @if (product.image) {
          <div class="product-image">
            <img src="{{product.image}}">
<!--            <img src="assets/images/product/{{product.image}}">-->
          </div>
        } @else {
          <div class="product-image">
            <img src="assets/images/pizzzzza.png">
          </div>
        }

        <custom-title [title]="product.title | uppercase" #customTitle></custom-title>

        <div class="product-text">{{ product.description | wordUpper:['сыр','томат','гриб']}}</div>
        <div class="product-action" #elem>
        <a class="btn btn-add-to-cart" routerLink="/order" [queryParams]="{product:product.title}">В корзину</a>
           </div>



    </div>
  </div>
</section>
